name: CI

on:
  push:
    branches: [main, "step*"]   # main + Step branches (e.g. step02-coreschema)
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # conda-forge env is activated for every `run:` step (login shell).
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      # The golden fixtures are GEOS-version-sensitive: shapely's union /
      # difference / slab-cut output (regionize) differs across GEOS builds,
      # so the pinned GEOS must match the canonical runtime (conda env
      # `IfcOpenHouse`: shapely 2.1.2 / GEOS 3.14.1). pip wheels bundle their
      # own (often older) GEOS, which would re-break the goldens — hence
      # conda-forge with an explicit `geos` pin rather than `pip install`.
      - name: Set up conda-forge env (pin GEOS to match runtime)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: roomlayout-ci
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            python=3.11
            shapely=2.1.2
            geos=3.14.1
            numpy
            networkx
            pytest
            ruff

      - name: Install package (deps come from conda, not pip)
        run: python -m pip install -e . --no-deps

      - name: Report geometry toolchain versions
        run: |
          python -c "import shapely; from shapely import geos_version; print('shapely', shapely.__version__, '| GEOS', '.'.join(map(str, geos_version)))"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest
